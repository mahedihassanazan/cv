<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic CV Generator - Mahedi Style</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --paper-width: 210mm;
            --paper-height: 297mm;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Left Panel: Editor --- */
        .editor-panel {
            width: 40%;
            min-width: 400px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header-title { text-align: center; margin-bottom: 20px; color: var(--primary-color); font-weight: bold; }
        
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #333; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem;
        }

        /* Dynamic Section Styling */
        .section-block {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            position: relative;
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .section-title-input { font-weight: bold; border: none; border-bottom: 2px solid #ddd; width: 70%; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-sm { padding: 2px 6px; font-size: 0.8rem; width: auto; display: inline-block;}
        .btn-danger { background-color: #ef4444; }
        .btn-add { background-color: #10b981; width: 100%; margin-top: 10px;}
        
        .list-item { background: #f9fafb; padding: 5px; border: 1px solid #eee; margin-bottom: 5px; border-radius: 4px; }

        /* --- Right Panel: Preview --- */
        .preview-panel {
            flex: 1; background: #525659; padding: 40px; overflow-y: auto; display: flex; justify-content: center;
        }

        /* --- A4 Page Styles --- */
        .cv-page {
            background: white; width: var(--paper-width); min-height: var(--paper-height); padding: 40px 50px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3); font-family: 'Times New Roman', Times, serif; color: #000; line-height: 1.3;
        }
        .cv-header { text-align: center; margin-bottom: 15px; }
        
        /* PROFILE PICTURE STYLE */
        .profile-pic-container {
            display: flex; justify-content: center; margin-bottom: 15px;
        }
        .cv-profile-pic {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid #333;
        }

        .cv-name { font-size: 26px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .cv-contact { font-size: 11px; margin-top: 5px; line-height: 1.4; }
        .cv-section { margin-bottom: 12px; }
        .cv-section-title { font-size: 13px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #000; margin-bottom: 6px; padding-bottom: 2px; }
        .cv-summary { font-size: 11px; text-align: justify; margin-bottom: 10px; }
        
        .cv-checklist ul, .cv-skills ul { list-style: none; padding: 0; margin: 0; font-size: 11px; }
        .cv-checklist li::before, .cv-skills li::before { content: "✓"; margin-right: 5px; }
        .cv-edu-item { font-size: 11px; margin-bottom: 8px; }
        .cv-edu-header { display: flex; justify-content: space-between; font-weight: bold; }
        .cv-edu-sub { font-style: italic; }
        .cv-paper { font-size: 11px; margin-bottom: 5px; }
        .cv-ref-block { font-size: 11px; margin-bottom: 10px; }
        .cv-ref-name { font-weight: bold; }

        /* --- Print Styles --- */
        @media print {
            body { background: white; height: auto; overflow: visible; display: block; }
            .editor-panel { display: none; }
            .preview-panel { padding: 0; background: white; display: block; overflow: visible; }
            .cv-page { box-shadow: none; margin: 0; width: 100%; height: auto; page-break-after: avoid; }
            @page { margin: 0; size: auto; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .editor-panel { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <!-- INPUT FORM -->
    <aside class="editor-panel">
        <h2 class="header-title">Dynamic CV Editor</h2>
        
        <!-- Personal Info -->
        <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" id="profilePicInput" accept="image/*" onchange="handleImageUpload(event)">
            <small style="color:#666;">Upload a professional photo (processed locally).</small>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" oninput="updatePersonal()">
        </div>
        <div class="form-group">
            <label>Contact Details</label>
            <input type="text" id="email" placeholder="Email" oninput="updatePersonal()">
            <input type="text" id="address" placeholder="Address" oninput="updatePersonal()">
            <input type="text" id="web" placeholder="Website" oninput="updatePersonal()">
            <input type="text" id="phone" placeholder="Phone" oninput="updatePersonal()">
        </div>
        <div class="form-group">
            <label>Professional Summary</label>
            <textarea id="summary" rows="4" oninput="updatePersonal()"></textarea>
        </div>

        <hr>
        <h3 style="text-align: center; color: #666;">SECTIONS MANAGER</h3>

        <!-- Dynamic Sections -->
        <div id="dynamicFormContainer"></div>

        <button class="btn btn-add" onclick="showAddSectionModal()">+ Add New Section</button>
        
        <hr style="margin: 20px 0; margin-top: auto;">
        
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background-color: #10b981; flex: 1;" onclick="window.print()">📄 Download PDF</button>
            <button class="btn" style="background-color: #2b5797; flex: 1;" onclick="downloadWord()">Download Word</button>
        </div>
        <small style="color:#666; display:block; margin-top:5px; font-size: 11px; text-align: center;">
            * All processing is done locally in your browser.
        </small>
    </aside>

    <!-- LIVE PREVIEW -->
    <main class="preview-panel">
        <div class="cv-page">
            <div class="cv-header">
                <!-- Profile Image Container -->
                <div class="profile-pic-container">
                    <img id="cvProfilePic" class="cv-profile-pic" src="" style="display: none;" alt="Profile Picture">
                </div>

                <div class="cv-name" id="cvName">MAHEDI HASSAN</div>
                <div class="cv-contact">
                    <span id="cvEmail">email@example.com</span><br>
                    <span id="cvAddress">Address</span><br>
                    Website: <span id="cvWeb">website.com</span><br>
                    <span id="cvPhone">+880...</span>
                </div>
            </div>
            <div class="cv-section">
                <div class="cv-summary" id="cvSummary">Summary...</div>
            </div>
            
            <div id="dynamicCVContainer"></div>
        </div>
    </main>

    <script>
        // --- INITIAL DATA ---
        let personalData = {
            name: "MAHEDI HASSAN",
            email: "biomahedihassan@gmail.com",
            address: "Telipara, Bason, Chandona-1702, Gazipur, Bangladesh",
            web: "https://mahedihassanazan.github.io/edu/",
            phone: "+8801575780459",
            summary: "An essential factor in achieving excellence in pharmaceutical industry is developing a skilled, detail-oriented workforce committed to maintaining quality and compliance. I possess a strong foundation in laboratory practices and analytical techniques, supported by good proficiency in computer applications for data recording, analysis, and documentation."
        };

        let cvSections = [
            {
                id: 1,
                type: "list",
                title: "COMPUTATIONAL SKILLS",
                items: ["Linux", "Biopython", "Pymol", "Autodock Vina", "C-Docker", "Gromacs", "Amber", "HTML", "Origin Pro", "MS Office"]
            },
            {
                id: 2,
                type: "list",
                title: "LABORATORY EXPERTISE",
                items: ["Cell-Culture", "PCR", "Site-Directed Mutagenesis", "Cloning", "Phase Solubility", "Spectroscopy", "ELISA", "Automated Biochemistry Analyzer", "Microscopy & Imaging"]
            },
            {
                id: 3,
                type: "education",
                title: "EDUCATIONAL QUALIFICATION",
                items: [
                    { degree: "Bachelor's of Biochemistry and Molecular Biology", school: "Gono Bishwabiddalay (2017-2021)", concentration: "Concentration: Biochemistry", result: "Results: 3.71 out of 4.0" },
                    { degree: "Diploma In Laboratory Technology", school: "Chandana Institute (2012-2016)", concentration: "Laboratory Medicine", result: "3.81 out of 4.0" },
                    { degree: "SSC", school: "M E H Arif College (2006-2012)", concentration: "Science", result: "4.44 out of 5.0" }
                ]
            },
            {
                id: 4,
                type: "list",
                title: "TRAINING AND CERTIFICATION",
                items: ["Biosafety & Biosecurity (BSL-II)", "Bioinformatics & Drug Design Trainee (CADD)", "Student Research Ambassador (NSRI)"]
            },
            {
                id: 5,
                type: "list",
                title: "ON-GOING PROJECT",
                items: ["In-Silico and In-Vitro studies on Methaxalone derivatives", "Surface-Modified Gold Nanoparticles in Immunosensor Technology"]
            },
            {
                id: 6,
                type: "paper",
                title: "PUBLISHED PAPERS",
                items: [
                    { title: "Effects of supplementing layers with alfalfa and moringa", link: "https://doi.org/10.34104/ajpab.023.01240130" },
                    { title: "Identification of tapeworms in poultry", link: "https://doi.org/10.34104/ijavs.024.012026" }
                ]
            },
            {
                id: 7,
                type: "list",
                title: "CAPABILITIES",
                items: ["Adaptable to diverse environments", "Effective relationship builder", "Leadership capability", "Strong team player"]
            },
            {
                id: 8,
                type: "list",
                title: "LANGUAGE PROFICIENCY",
                items: ["English: Proficient", "Bangla: Native", "Hindi: Conversational"]
            },
            {
                id: 9,
                type: "reference",
                title: "REFERENCES",
                items: [
                    { name: "Dr. Shyam Sundar Shaha", title: "Associate Professor, Dept of BMB, Gono Bishwabidyalay", contact: "+8801683-320497", email: "sshaha79@yahoo.com" },
                    { name: "Dr. Fuad Hossain", title: "Associate Professor and Head, Dept of BMB", contact: "+8801979864011", email: "head.bmb@gonouniversity.edu.bd" }
                ]
            }
        ];

        window.onload = function() {
            document.getElementById('name').value = personalData.name;
            document.getElementById('email').value = personalData.email;
            document.getElementById('address').value = personalData.address;
            document.getElementById('web').value = personalData.web;
            document.getElementById('phone').value = personalData.phone;
            document.getElementById('summary').value = personalData.summary;
            updatePersonal();
            renderAll();
        };

        function updatePersonal() {
            personalData.name = document.getElementById('name').value;
            personalData.email = document.getElementById('email').value;
            personalData.address = document.getElementById('address').value;
            personalData.web = document.getElementById('web').value;
            personalData.phone = document.getElementById('phone').value;
            personalData.summary = document.getElementById('summary').value;

            document.getElementById('cvName').innerText = personalData.name;
            document.getElementById('cvEmail').innerText = personalData.email;
            document.getElementById('cvAddress').innerText = personalData.address;
            document.getElementById('cvWeb').innerText = personalData.web;
            document.getElementById('cvPhone').innerText = personalData.phone;
            document.getElementById('cvSummary').innerText = personalData.summary;
        }

        // --- IMAGE UPLOAD LOGIC ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Create an image to resize
                    const img = new Image();
                    img.onload = function() {
                        // Resize logic for performance
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 300; // Resize max width
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Convert to Base64
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        
                        // Update Preview
                        const previewImg = document.getElementById('cvProfilePic');
                        previewImg.src = dataUrl;
                        previewImg.style.display = 'block';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // --- RENDERER ---
        function renderAll() {
            const formContainer = document.getElementById('dynamicFormContainer');
            const cvContainer = document.getElementById('dynamicCVContainer');
            formContainer.innerHTML = '';
            cvContainer.innerHTML = '';

            cvSections.forEach((section, index) => {
                const formSection = document.createElement('div');
                formSection.className = 'section-block';
                let formHTML = `
                    <div class="section-header">
                        <input class="section-title-input" value="${section.title}" oninput="updateSectionTitle(${index}, this.value)">
                        <button class="btn btn-danger btn-sm" onclick="deleteSection(${index})">Delete</button>
                    </div>`;
                
                section.items.forEach((item, itemIndex) => {
                    formHTML += `<div class="list-item">`;
                    if (section.type === 'list') {
                        formHTML += `<input type="text" value="${item}" oninput="updateItem(${index}, ${itemIndex}, this.value)">
                        <button class="btn btn-danger btn-sm" style="float:right" onclick="deleteItem(${index}, ${itemIndex})">×</button>`;
                    } else if (section.type === 'education') {
                        formHTML += `<button class="btn btn-danger btn-sm" style="float:right" onclick="deleteItem(${index}, ${itemIndex})">×</button>
                        <input type="text" placeholder="Degree" value="${item.degree}" oninput="updateEduField(${index}, ${itemIndex}, 'degree', this.value)"><br>
                        <input type="text" placeholder="School" value="${item.school}" oninput="updateEduField(${index}, ${itemIndex}, 'school', this.value)"><br>
                        <input type="text" placeholder="Concentration" value="${item.concentration}" oninput="updateEduField(${index}, ${itemIndex}, 'concentration', this.value)"><br>
                        <input type="text" placeholder="Result" value="${item.result}" oninput="updateEduField(${index}, ${itemIndex}, 'result', this.value)">`;
                    } else if (section.type === 'paper') {
                        formHTML += `<button class="btn btn-danger btn-sm" style="float:right" onclick="deleteItem(${index}, ${itemIndex})">×</button>
                        <input type="text" placeholder="Paper Title" value="${item.title}" oninput="updatePaperField(${index}, ${itemIndex}, 'title', this.value)"><br>
                        <input type="text" placeholder="Link" value="${item.link}" oninput="updatePaperField(${index}, ${itemIndex}, 'link', this.value)">`;
                    } else if (section.type === 'reference') {
                        formHTML += `<button class="btn btn-danger btn-sm" style="float:right" onclick="deleteItem(${index}, ${itemIndex})">×</button>
                        <input type="text" placeholder="Name" value="${item.name}" oninput="updateRefField(${index}, ${itemIndex}, 'name', this.value)"><br>
                        <input type="text" placeholder="Title" value="${item.title}" oninput="updateRefField(${index}, ${itemIndex}, 'title', this.value)"><br>
                        <input type="text" placeholder="Contact" value="${item.contact}" oninput="updateRefField(${index}, ${itemIndex}, 'contact', this.value)"><br>
                        <input type="text" placeholder="Email" value="${item.email}" oninput="updateRefField(${index}, ${itemIndex}, 'email', this.value)">`;
                    }
                    formHTML += `</div>`;
                });
                formHTML += `<button class="btn btn-sm" onclick="addItem(${index})">+ Add Item</button>`;
                formSection.innerHTML = formHTML;
                formContainer.appendChild(formSection);

                // CV Preview Render
                const cvSectionDiv = document.createElement('div');
                cvSectionDiv.className = 'cv-section';
                let cvHTML = `<div class="cv-section-title">${section.title}</div>`;
                if(section.type === 'list') cvHTML += `<ul class="cv-checklist">` + section.items.map(i => `<li>${i}</li>`).join('') + `</ul>`;
                else if (section.type === 'education') section.items.forEach(e => { cvHTML += `<div class="cv-edu-item"><div class="cv-edu-header"><span>${e.degree}</span></div><div class="cv-edu-sub">${e.school}</div><div>${e.concentration}</div><div>${e.result}</div></div>`; });
                else if (section.type === 'paper') section.items.forEach(p => { cvHTML += `<div class="cv-paper">✓ ${p.title} <br><a href="${p.link}" target="_blank">${p.link}</a></div>`; });
                else if (section.type === 'reference') section.items.forEach(r => { cvHTML += `<div class="cv-ref-block"><div class="cv-ref-name">${r.name}</div><div>${r.title}</div><div>Contact: ${r.contact}</div><div>Email: ${r.email}</div></div>`; });
                
                cvSectionDiv.innerHTML = cvHTML;
                cvContainer.appendChild(cvSectionDiv);
            });
        }

        // --- MANIPULATION ---
        function addSection(type) {
            const newId = cvSections.length > 0 ? Math.max(...cvSections.map(s => s.id)) + 1 : 1;
            const newSection = { id: newId, type: type, title: "NEW SECTION", items: type === 'education' ? [{degree:'', school:'', concentration:'', result:''}] : type === 'paper' ? [{title:'', link:''}] : type === 'reference' ? [{name:'', title:'', contact:'', email:''}] : [""] };
            cvSections.push(newSection); renderAll();
        }
        function showAddSectionModal() {
            const type = prompt("Type: list, education, paper, reference");
            if (type === 'list' || type === 'education' || type === 'paper' || type === 'reference') addSection(type);
        }
        function deleteSection(index) { if(confirm("Delete?")) { cvSections.splice(index, 1); renderAll(); } }
        function updateSectionTitle(index, val) { cvSections[index].title = val; renderAll(); } 
        function addItem(sectionIndex) {
            const sec = cvSections[sectionIndex];
            if(sec.type === 'list') sec.items.push("");
            else if(sec.type === 'education') sec.items.push({degree:'', school:'', concentration:'', result:''});
            else if(sec.type === 'paper') sec.items.push({title:'', link:''});
            else if(sec.type === 'reference') sec.items.push({name:'', title:'', contact:'', email:''});
            renderAll();
        }
        function deleteItem(sectionIndex, itemIndex) { cvSections[sectionIndex].items.splice(itemIndex, 1); renderAll(); }
        function updateItem(sectionIndex, itemIndex, val) { cvSections[sectionIndex].items[itemIndex] = val; }
        function updateEduField(sIdx, iIdx, field, val) { cvSections[sIdx].items[iIdx][field] = val; }
        function updatePaperField(sIdx, iIdx, field, val) { cvSections[sIdx].items[iIdx][field] = val; }
        function updateRefField(sIdx, iIdx, field, val) { cvSections[sIdx].items[iIdx][field] = val; }

        // --- MANUAL DOWNLOAD ---
        function downloadWord() {
            const content = document.querySelector('.cv-page').innerHTML;
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${personalData.name.replace(/\s+/g, '_')}_CV.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
